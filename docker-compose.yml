services:
  mongo:
    image: mongo:7
    container_name: gcet-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./Backend
    container_name: gcet-backend
    restart: unless-stopped
    env_file:
      - Backend/.env
    environment:
      MONGO_URL: mongodb://mongo:27017/gcet_papershub
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - mongo

  frontend:
    build:
      context: ./Frontend
      args:
        VITE_APP_BACKEND_URL: http://localhost:3000
    container_name: gcet-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mongo_data:
